<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Multiplayer FPS</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
}

canvas{
display:block;
background:#0f0f0f;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
}
</style>
</head>

<body>

<div id="hud">MULTIPLAYER ONLINE</div>
<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let players = {};

let me = {
x: 200,
y: 200,
speed: 4
};

// 🔥 odbiór graczy (TO JEST MULTIPLAYER)
socket.on("init", (data) => {
players = data;
});

socket.on("players", (data) => {
players = data;
});

// 🎮 ruch
let keys = {};

document.addEventListener("keydown", (e) => keys[e.key] = true);
document.addEventListener("keyup", (e) => keys[e.key] = false);

function update(){

if(keys["w"]) me.y -= me.speed;
if(keys["s"]) me.y += me.speed;
if(keys["a"]) me.x -= me.speed;
if(keys["d"]) me.x += me.speed;

// 🔥 wysyłka do serwera
socket.emit("move", me);
}

// 🎨 rysowanie graczy
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let id in players){

let p = players[id];

ctx.fillStyle = "deepskyblue";
ctx.fillRect(p.x, p.y, 25, 25);

}

// ty (wyróżnienie)
ctx.fillStyle = "lime";
ctx.fillRect(me.x, me.y, 25, 25);

requestAnimationFrame(draw);
}

function loop(){
update();
requestAnimationFrame(loop);
}

loop();
draw();
</script>

</body>
</html>
