<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>2D FPS MULTI</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
}

canvas{
display:block;
background:#1a1a1a;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
}
</style>
</head>

<body>

<div id="hud">2D MULTIPLAYER FPS</div>
<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let players = {};

let me = {
x: 200,
y: 200,
speed: 4
};

// 📡 odbiór
socket.on("init", (data)=>{
players = data;
});

socket.on("players", (data)=>{
players = data;
});

// 🎮 ruch
let keys = {};

document.addEventListener("keydown", e=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
keys[e.key.toLowerCase()] = false;
});

function update(){

if(keys["w"]) me.y -= me.speed;
if(keys["s"]) me.y += me.speed;
if(keys["a"]) me.x -= me.speed;
if(keys["d"]) me.x += me.speed;

socket.emit("move", me);

}

// 🔫 strzelanie
document.addEventListener("click", ()=>{

socket.emit("shoot", {
x: me.x,
y: me.y
});

});

// 🎨 rysowanie
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// gracze
for(let id in players){

let p = players[id];

ctx.fillStyle = p.team;

ctx.fillRect(p.x, p.y, 20, 20);

// HP bar
ctx.fillStyle = "red";
ctx.fillRect(p.x, p.y-10, 20, 5);

ctx.fillStyle = "lime";
ctx.fillRect(p.x, p.y-10, (p.hp/100)*20, 5);

}

// ty
ctx.fillStyle = "yellow";
ctx.fillRect(me.x, me.y, 20, 20);

requestAnimationFrame(draw);
}

function loop(){
update();
requestAnimationFrame(loop);
}

loop();
draw();

</script>

</body>
</html>
