<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>3D FPS MULTI</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-family:Arial;
}
</style>
</head>

<body>

<div id="hud">3D FPS MULTIPLAYER</div>
<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let id = null;
let players = {};

socket.on("init", (myId)=>{
id = myId;
});

socket.on("players", (data)=>{
players = data;
});

// 🧱 MAPA (ściany)
const walls = [
{ x:200, y:200, w:200, h:20 },
{ x:500, y:300, w:20, h:200 },
{ x:300, y:500, w:300, h:20 }
];

let me = {
x: 100,
y: 100,
angle: 0,
speed: 3
};

let keys = {};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false;
});

// 🎮 ruch
function update(){

if(keys["w"]) me.y -= me.speed;
if(keys["s"]) me.y += me.speed;
if(keys["a"]) me.x -= me.speed;
if(keys["d"]) me.x += me.speed;

// wysyłka
socket.emit("state", me);
}

// 🧭 mysz = obrót
document.addEventListener("mousemove",(e)=>{
me.angle = e.clientX / innerWidth * Math.PI * 2;
});

// 🔫 strzał
document.addEventListener("click",()=>{
socket.emit("shoot");
});

// 🎨 RAYCAST 3D (pseudo)
function draw3D(){

ctx.fillStyle = "#111";
ctx.fillRect(0,0,canvas.width,canvas.height);

let fov = 60;
let rays = 120;

for(let i=0;i<rays;i++){

let rayAngle = me.angle - (fov/2) + (i/rays)*fov;

let dist = 0;
let hit = false;

while(!hit && dist < 300){

dist += 2;

let rx = me.x + Math.cos(rayAngle)*dist;
let ry = me.y + Math.sin(rayAngle)*dist;

for(let w of walls){

if(rx>w.x && rx<w.x+w.w && ry>w.y && ry<w.y+w.h){
hit = true;
break;
}

}

}

let shade = 255 - dist;

ctx.fillStyle = `rgb(${shade},${shade},${shade})`;

let h = 500 / (dist+1);

ctx.fillRect(i*(canvas.width/rays), canvas.height/2 - h/2, canvas.width/rays+1, h);
}

}

// 🧍 gracze
function drawPlayers(){

for(let i in players){

let p = players[i];

if(i === id) continue;

ctx.fillStyle = p.team;

ctx.fillRect(p.x/5, p.y/5, 10, 10);

}

}

// 🔁 loop
function loop(){

update();

draw3D();

drawPlayers();

requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
