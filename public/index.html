<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>2D FPS MULTI STABLE</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
}

canvas{
display:block;
background:#1a1a1a;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:14px;
background:rgba(0,0,0,0.4);
padding:8px;
border-radius:6px;
}

#cross{
position:fixed;
left:50%;
top:50%;
width:8px;
height:8px;
border:2px solid white;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}
</style>
</head>

<body>

<div id="hud">2D FPS STABLE</div>
<div id="cross"></div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let players = {};
let myId = null;

// 📡 init
socket.on("init",(id)=>{
myId = id;
});

// 📡 sync
socket.on("players",(data)=>{
players = data;
});

// 🧍 gracz
let me = {
x: 200,
y: 200,
speed: 4
};

// 🎮 input
let keys = {};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false;
});

// 🔁 ruch
function update(){

if(keys["w"]) me.y -= me.speed;
if(keys["s"]) me.y += me.speed;
if(keys["a"]) me.x -= me.speed;
if(keys["d"]) me.x += me.speed;

socket.emit("move",me);
}

// 🔫 strzał
document.addEventListener("click",()=>{

socket.emit("shoot",{
x:me.x,
y:me.y
});

});

// 🎨 rysowanie
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// gracze
for(let id in players){

let p = players[id];

ctx.fillStyle = (p.team === "red") ? "#ff4444" : "#4488ff";

ctx.fillRect(p.x-10,p.y-10,20,20);

// HP
ctx.fillStyle = "red";
ctx.fillRect(p.x-10,p.y-18,20,3);

ctx.fillStyle = "lime";
ctx.fillRect(p.x-10,p.y-18,(p.hp/100)*20,3);
}

// ty
ctx.fillStyle = "yellow";
ctx.fillRect(me.x-10,me.y-10,20,20);

requestAnimationFrame(draw);
}

// loop
function loop(){
update();
requestAnimationFrame(loop);
}

loop();
draw();

</script>

</body>
</html>
