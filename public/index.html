<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>2D FPS PRO</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
cursor:none;
}

canvas{
display:block;
background:#1a1a1a;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-family:Arial;
}
</style>
</head>

<body>

<div id="hud">2D FPS PRO</div>
<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let players = {};
let bullets = [];
let myId = null;

let me = {
x: 200,
y: 200,
speed: 4
};

// 📡 init
socket.on("init", (data)=>{
players = data.players;
myId = data.id;
});

// 📡 state
socket.on("state", (data)=>{
players = data.players;
bullets = data.bullets;
});

// 🎮 ruch
let keys = {};

document.addEventListener("keydown", e=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
keys[e.key.toLowerCase()] = false;
});

function update(){

if(keys["w"]) me.y -= me.speed;
if(keys["s"]) me.y += me.speed;
if(keys["a"]) me.x -= me.speed;
if(keys["d"]) me.x += me.speed;

socket.emit("move", me);
}

// 🔫 strzelanie + mysz
document.addEventListener("click", (e)=>{

let angle = Math.atan2(
e.clientY - canvas.height/2,
e.clientX - canvas.width/2
);

socket.emit("shoot", {
x: me.x,
y: me.y,
dx: Math.cos(angle) * 8,
dy: Math.sin(angle) * 8
});

});

// 🎨 render
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// bullets
ctx.fillStyle = "yellow";
for(let b of bullets){
ctx.beginPath();
ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
ctx.fill();
}

// players
for(let id in players){

let p = players[id];

ctx.fillStyle = p.team;
ctx.fillRect(p.x, p.y, 20, 20);

// HP bar
ctx.fillStyle = "red";
ctx.fillRect(p.x, p.y-10, 20, 4);

ctx.fillStyle = "lime";
ctx.fillRect(p.x, p.y-10, (p.hp/100)*20, 4);
}

requestAnimationFrame(draw);
}

function loop(){
update();
requestAnimationFrame(loop);
}

loop();
draw();

</script>

</body>
</html>
