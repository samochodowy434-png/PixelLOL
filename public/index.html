<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>3D FPS SIMPLE PRO</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
cursor:none;
font-family:Arial;
}

canvas{display:block;}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
}

#cross{
position:fixed;
left:50%;
top:50%;
width:8px;
height:8px;
border:2px solid white;
transform:translate(-50%,-50%);
border-radius:50%;
}
</style>
</head>

<body>

<div id="hud">
HP: <span id="hp">100</span> |
Kills: <span id="kills">0</span>
</div>

<div id="cross"></div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let players = {};
let myId = null;

let me = {
x:100,
y:100,
angle:0,
speed:2
};

// MAPA 3D (ściany)
const walls = [
{ x:0,y:0,w:500,h:20 },
{ x:0,y:0,w:20,h:500 },
{ x:480,y:0,w:20,h:500 },
{ x:0,y:480,w:500,h:20 },

{ x:200,y:200,w:100,h:20 },
{ x:300,y:100,w:20,h:120 }
];

// SOCKET
socket.on("init",(id)=> myId=id );

socket.on("players",(data)=>{
players=data;

document.getElementById("hp").innerText =
players[myId]?.hp || 100;

document.getElementById("kills").innerText =
players[myId]?.kills || 0;
});

// MOVEMENT
let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// MYSZ = OBROT (WAŻNE)
document.addEventListener("mousemove",(e)=>{
me.angle = Math.atan2(
e.clientY - c.height/2,
e.clientX - c.width/2
);
});

// KOLIZJE
function collide(nx,ny){
for(let w of walls){
if(nx>w.x && nx<w.x+w.w && ny>w.y && ny<w.y+w.h){
return true;
}
}
return false;
}

// MOVE
function update(){

let nx=me.x;
let ny=me.y;

if(keys["w"]){
nx += Math.cos(me.angle)*me.speed;
ny += Math.sin(me.angle)*me.speed;
}
if(keys["s"]){
nx -= Math.cos(me.angle)*me.speed;
ny -= Math.sin(me.angle)*me.speed;
}
if(keys["a"]){
nx += Math.cos(me.angle-Math.PI/2)*me.speed;
ny += Math.sin(me.angle-Math.PI/2)*me.speed;
}
if(keys["d"]){
nx += Math.cos(me.angle+Math.PI/2)*me.speed;
ny += Math.sin(me.angle+Math.PI/2)*me.speed;
}

if(!collide(nx,ny)){
me.x=nx;
me.y=ny;
}

socket.emit("move",me);
}

// STRZELANIE (REAL FIX)
document.addEventListener("click",()=>{

socket.emit("shoot",{
x:me.x,
y:me.y
});
});

// RENDER 3D (raycast fake)
function draw3D(){

ctx.fillStyle="#1a1a1a";
ctx.fillRect(0,0,c.width,c.height);

for(let i=0;i<100;i++){

let rayAngle = me.angle - 0.5 + (i/100);

let rx = me.x;
let ry = me.y;

for(let j=0;j<200;j++){

rx += Math.cos(rayAngle)*2;
ry += Math.sin(rayAngle)*2;

for(let w of walls){

if(rx>w.x && rx<w.x+w.w && ry>w.y && ry<w.y+w.h){

let dist = Math.hypot(rx-me.x, ry-me.y);

let h = 500 / dist;

ctx.fillStyle = `rgb(${200-dist},${200-dist},255)`;

ctx.fillRect(i*10, c.height/2 - h/2, 10, h);

j=200;
break;
}

}

}
}

}

// PLAYERS (fasolki 3D overlay)
function drawPlayers(){

for(let id in players){

let p=players[id];

ctx.fillStyle=p.hp>50?"red":"darkred";

ctx.beginPath();
ctx.arc(p.x,p.y,8,0,Math.PI*2);
ctx.fill();

}
}

// LOOP
function loop(){
update();
draw3D();
drawPlayers();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
