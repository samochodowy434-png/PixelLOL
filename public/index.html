<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>2D FPS PRO UPGRADE</title>

<style>
body{
margin:0;
overflow:hidden;
background:#0b0f14;
cursor:none;
font-family:Arial;
}

canvas{
display:block;
}

/* HUD */
#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:14px;
background:rgba(0,0,0,0.4);
padding:10px;
border-radius:8px;
}

/* celownik */
#crosshair{
position:fixed;
left:50%;
top:50%;
width:10px;
height:10px;
border:2px solid white;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

/* mini radar */
#radar{
position:fixed;
bottom:10px;
right:10px;
width:120px;
height:120px;
background:rgba(0,0,0,0.4);
border-radius:10px;
}
</style>
</head>

<body>

<div id="hud">2D FPS PRO 🔫</div>
<div id="crosshair"></div>
<div id="radar"></div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// 🔥 gracze
let players = {};
let myId = null;

// 📡 sync
socket.on("init", (id)=>{
myId = id;
});

socket.on("players", (data)=>{
players = data;
});

// 🎮 player
let me = {
x: 300,
y: 300,
angle: 0,
speed: 4
};

// WASD
let keys = {};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false;
});

// 🧠 ruch
function update(){

if(keys["w"]) me.y -= me.speed;
if(keys["s"]) me.y += me.speed;
if(keys["a"]) me.x -= me.speed;
if(keys["d"]) me.x += me.speed;

// sync
socket.emit("move", me);
}

// 🖱️ obrót myszką
document.addEventListener("mousemove",(e)=>{

let dx = e.clientX - canvas.width/2;
let dy = e.clientY - canvas.height/2;

me.angle = Math.atan2(dy, dx);
});

// 🔫 strzelanie
document.addEventListener("click",()=>{

socket.emit("shoot", {
x: me.x,
y: me.y,
angle: me.angle
});
});

// 🎨 mapa + grafika
function draw(){

// tło (ładniejsze)
ctx.fillStyle = "#0b0f14";
ctx.fillRect(0,0,canvas.width,canvas.height);

// światło (efekt FPS)
let gradient = ctx.createRadialGradient(
canvas.width/2, canvas.height/2, 50,
canvas.width/2, canvas.height/2, canvas.width
);

gradient.addColorStop(0,"rgba(255,255,255,0.05)");
gradient.addColorStop(1,"rgba(0,0,0,0.6)");

ctx.fillStyle = gradient;
ctx.fillRect(0,0,canvas.width,canvas.height);

// gracze
for(let id in players){

let p = players[id];

// kolor teamu
ctx.fillStyle = p.team === "red" ? "#ff3b3b" : "#3b8bff";

// ciało
ctx.fillRect(p.x - 10, p.y - 10, 20, 20);

// HP
ctx.fillStyle = "red";
ctx.fillRect(p.x - 10, p.y - 18, 20, 3);

ctx.fillStyle = "lime";
ctx.fillRect(p.x - 10, p.y - 18, (p.hp/100)*20, 3);
}

// ty (wyróżnienie)
ctx.fillStyle = "yellow";
ctx.fillRect(me.x - 10, me.y - 10, 20, 20);

requestAnimationFrame(draw);
}

// loop
function loop(){
update();
requestAnimationFrame(loop);
}

loop();
draw();

</script>

</body>
</html>
