<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto 3D - Gra</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    text-align:center;
}

h1{margin:15px}

#machine{
    width:260px;
    height:260px;
    margin:20px auto;
    border-radius:50%;
    border:8px solid rgba(255,255,255,0.25);
    background:radial-gradient(circle,#334155,#0f172a);
    position:relative;
    overflow:hidden;
}

.ball3d{
    width:16px;
    height:16px;
    border-radius:50%;
    background:#60a5fa;
    position:absolute;
}

.spin{
    animation:spin 1.5s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,58px);
    justify-content:center;
    gap:8px;
    margin:20px;
}

.num{
    width:58px;
    height:58px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    background:radial-gradient(circle,#fff,#facc15);
    color:black;
    font-weight:bold;
    transition:0.2s;
}

.num:hover{transform:scale(1.05)}

.selected{
    background:radial-gradient(circle,#fff,#22c55e);
}

button{
    padding:10px 18px;
    font-size:18px;
    margin:8px;
    cursor:pointer;
}

#results{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:15px;
}

.drawn{
    width:65px;
    height:65px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#60a5fa;
    color:black;
    font-weight:bold;
    font-size:22px;
}
</style>
</head>

<body>

<h1>🎲 Symulator Lotto 3D</h1>
<p>Wybierz 6 liczb (1–49)</p>

<div id="machine"></div>

<div class="grid" id="grid"></div>

<button id="drawBtn">Losuj</button>
<button id="resetBtn">Nowa gra</button>

<p><b>Twoje liczby:</b> <span id="picked"></span></p>

<div id="results"></div>
<h2 id="score"></h2>

<script>
let selected = [];
let finished = false;

const machine = document.getElementById("machine");
const grid = document.getElementById("grid");

function createMachineBalls(){
    machine.innerHTML = "";
    for(let i=0;i<35;i++){
        const b = document.createElement("div");
        b.className = "ball3d";
        b.style.left = (120 + Math.cos(i)*90) + "px";
        b.style.top  = (120 + Math.sin(i*1.6)*90) + "px";
        machine.appendChild(b);
    }
}

createMachineBalls();

function createGrid(){
    grid.innerHTML = "";
    selected = [];
    finished = false;
    document.getElementById("picked").textContent = "";
    document.getElementById("results").innerHTML = "";
    document.getElementById("score").textContent = "";
    machine.classList.remove("spin");

    for(let i=1;i<=49;i++){
        const el = document.createElement("div");
        el.className = "num";
        el.textContent = i;

        el.onclick = () => {
            if(finished) return;

            if(selected.includes(i)){
                selected = selected.filter(x => x !== i);
                el.classList.remove("selected");
            } else if(selected.length < 6){
                selected.push(i);
                el.classList.add("selected");
            }

            document.getElementById("picked").textContent =
                selected.sort((a,b)=>a-b).join(", ");
        };

        grid.appendChild(el);
    }
}

createGrid();

document.getElementById("drawBtn").onclick = () => {
    if(finished) return alert("Kliknij Nowa gra!");

    if(selected.length !== 6)
        return alert("Wybierz 6 liczb!");

    finished = true;
    machine.classList.add("spin");

    setTimeout(() => {
        machine.classList.remove("spin");

        let pool = [...Array(49)].map((_,i)=>i+1);
        let draw = [];

        while(draw.length < 6){
            let r = Math.floor(Math.random() * pool.length);
            draw.push(pool.splice(r,1)[0]);
        }

        draw.sort((a,b)=>a-b);

        const res = document.getElementById("results");
        res.innerHTML = "";

        draw.forEach(n => {
            const d = document.createElement("div");
            d.className = "drawn";
            d.textContent = n;
            res.appendChild(d);
        });

        const hits = draw.filter(x => selected.includes(x)).length;
        document.getElementById("score").textContent =
            "Trafienia: " + hits + "/6";

    }, 2000);
};

document.getElementById("resetBtn").onclick = () => {
    createGrid();
    createMachineBalls();
};
</script>

</body>
</html>
