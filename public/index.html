<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>2D CITY FPS PRO</title>

<style>
body{
margin:0;
overflow:hidden;
background:#1a1f25;
font-family:Arial;
}

canvas{display:block;}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:8px;
}

#cross{
position:fixed;
left:50%;
top:50%;
width:10px;
height:10px;
border:2px solid white;
border-radius:50%;
transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div id="hud">🏙️ CITY FPS PRO</div>
<div id="cross"></div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let players = {};
let cars = [];

let me = {
x:200,
y:200,
speed:4,
weapon:"pistol"
};

// sync
socket.on("players",d=>players=d);
socket.on("cars",d=>cars=d);

socket.on("init",()=>{});

// MAPA
function drawMap(){

// ulice
ctx.fillStyle="#555";
ctx.fillRect(0,250,canvas.width,120);
ctx.fillRect(400,0,120,canvas.height);

// budynki
ctx.fillStyle="#2b2b2b";
ctx.fillRect(100,100,100,100);
ctx.fillRect(600,150,120,120);
ctx.fillRect(800,400,150,150);
}

// LUDZIE (ładniejsi)
function drawPlayers(){

for(let id in players){

let p=players[id];

ctx.fillStyle = p.hp>50 ? "#4b8bff" : "#ff4b4b";

ctx.beginPath();
ctx.arc(p.x,p.y,10,0,Math.PI*2);
ctx.fill();

// HP
ctx.fillStyle="red";
ctx.fillRect(p.x-10,p.y-18,20,4);
ctx.fillStyle="lime";
ctx.fillRect(p.x-10,p.y-18,(p.hp/100)*20,4);
}
}

// AUTA
function drawCars(){

cars.forEach(c=>{

ctx.fillStyle=c.color;
ctx.fillRect(c.x,c.y,40,20);

ctx.fillStyle="black";
ctx.fillText("X",c.x+12,c.y+15);

});
}

// RUCH
let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

function update(){

if(keys["w"]) me.y-=me.speed;
if(keys["s"]) me.y+=me.speed;
if(keys["a"]) me.x-=me.speed;
if(keys["d"]) me.x+=me.speed;

socket.emit("move",me);
}

// 🔫 STRZELANIE (NAPRAWIONE)
document.addEventListener("click",()=>{

socket.emit("shoot",{
x:me.x,
y:me.y,
damage:25,
range:80
});

});

// 🚗 WSIADANIE DO AUTA
document.addEventListener("keydown",(e)=>{

if(e.key.toLowerCase()==="x"){

cars.forEach(c=>{
let dx=me.x-c.x;
let dy=me.y-c.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<40){
socket.emit("enterCar",c.id);
}

});

}

});

// RYSOWANIE
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawMap();
drawCars();
drawPlayers();

requestAnimationFrame(draw);
}

// LOOP
function loop(){
update();
requestAnimationFrame(loop);
}

loop();
draw();

</script>

</body>
</html>
