<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Mini Miasto 2D FPS</title>

<style>
body{
margin:0;
overflow:hidden;
background:#222;
cursor:crosshair;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-family:Arial;
background:rgba(0,0,0,0.5);
padding:10px;
}

canvas{
display:block;
}
</style>
</head>

<body>

<div id="hud">
MINI MIASTO 2D<br>
WASD + mysz + klik = strzał<br>
HP / Kills
</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

// 👤 GRACZ
let me = {
x:200,
y:200,
speed:3,
hp:100,
kills:0
};

// 👥 INNI
let players = {};

// 🏙️ MIASTO (budynki)
const buildings = [
{x:100,y:100,w:100,h:150},
{x:400,y:200,w:120,h:200},
{x:700,y:300,w:150,h:120},
{x:300,y:500,w:200,h:150}
];

// INPUT
let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// MOVE
function update(){

let nx = me.x;
let ny = me.y;

if(keys["w"]) ny -= me.speed;
if(keys["s"]) ny += me.speed;
if(keys["a"]) nx -= me.speed;
if(keys["d"]) nx += me.speed;

me.x = nx;
me.y = ny;

socket.emit("move",me);
}

// 🔫 STRZELANIE
document.addEventListener("click",(e)=>{

socket.emit("shoot",{
x:me.x,
y:me.y
});

});

// RYSOWANIE MIASTA
function drawCity(){

ctx.fillStyle="#333";
ctx.fillRect(0,0,c.width,c.height);

// ulice
ctx.strokeStyle="#555";
for(let i=0;i<10;i++){
ctx.beginPath();
ctx.moveTo(i*100,0);
ctx.lineTo(i*100,c.height);
ctx.stroke();
}

// budynki
ctx.fillStyle="#777";
for(let b of buildings){
ctx.fillRect(b.x,b.y,b.w,b.h);
}

}

// RYSUJ GRACZY
function drawPlayers(){

for(let id in players){

let p = players[id];

ctx.fillStyle = "red";

ctx.beginPath();
ctx.arc(p.x,p.y,10,0,Math.PI*2);
ctx.fill();

}

}

// LOOP
function loop(){
requestAnimationFrame(loop);

update();

drawCity();
drawPlayers();

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(me.x,me.y,10,0,Math.PI*2);
ctx.fill();

}

loop();

// SOCKET
socket.on("players",(data)=>{
players=data;

if(players[socket.id]){
me.hp = players[socket.id].hp;
me.kills = players[socket.id].kills;
}

});

</script>

</body>
</html>
