<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>PixelLOL Multiplayer</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
cursor:none;
font-family:Arial;
}

canvas{
display:block;
background:#0f0f0f;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:18px;
z-index:10;
}

#info{
position:fixed;
top:40px;
left:10px;
color:#aaa;
font-size:14px;
}
</style>
</head>

<body>

<div id="hud">🟦 MULTIPLAYER FPS</div>
<div id="info">WASD = ruch</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let players = {};

// 🧍 lokalny gracz
let me = {
x: Math.random() * 500,
y: Math.random() * 500,
speed: 4
};

// 📡 odbiór graczy
socket.on("init", (data) => {
players = data;
});

socket.on("players", (data) => {
players = data;
});

// 🎮 ruch WASD
let keys = {};

document.addEventListener("keydown", (e) => {
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", (e) => {
keys[e.key.toLowerCase()] = false;
});

// 🔁 update ruchu
function update() {

if(keys["w"]) me.y -= me.speed;
if(keys["s"]) me.y += me.speed;
if(keys["a"]) me.x -= me.speed;
if(keys["d"]) me.x += me.speed;

// wysyłanie do serwera
socket.emit("move", me);

}

// 🎨 rysowanie
function draw() {

ctx.clearRect(0,0,canvas.width,canvas.height);

// gracze
for(let id in players){

let p = players[id];

ctx.fillStyle = (id === socket.id) ? "lime" : "deepskyblue";

ctx.fillRect(p.x, p.y, 25, 25);

}

// HUD gracza
ctx.fillStyle = "white";
ctx.fillText("Twoja pozycja: " + Math.floor(me.x) + "," + Math.floor(me.y), 10, 20);

requestAnimationFrame(draw);
}

// 🚀 loop gry
function loop(){
update();
requestAnimationFrame(loop);
}

loop();
draw();

window.addEventListener("resize", ()=>{
canvas.width = innerWidth;
canvas.height = innerHeight;
});
</script>

</body>
</html>
