<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>2D PRO CITY FPS</title>

<style>
body{
margin:0;
overflow:hidden;
background:#222;
font-family:Arial;
}

canvas{
display:block;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.4);
padding:10px;
border-radius:8px;
}

#cross{
position:fixed;
left:50%;
top:50%;
width:8px;
height:8px;
border:2px solid white;
border-radius:50%;
transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div id="hud">🏙️ 2D PRO FPS CITY</div>
<div id="cross"></div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let players = {};
let myId = null;

// 🧍 gracz
let me = {
x: 200,
y: 200,
speed: 4
};

// 📡 sync
socket.on("init",(id)=>{
myId = id;
});

socket.on("players",(data)=>{
players = data;
});

// 🎮 ruch
let keys = {};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false;
});

// 🔁 ruch
function update(){

if(keys["w"]) me.y -= me.speed;
if(keys["s"]) me.y += me.speed;
if(keys["a"]) me.x -= me.speed;
if(keys["d"]) me.x += me.speed;

socket.emit("move",me);
}

// 🔫 strzelanie (pistolet)
document.addEventListener("click",()=>{

socket.emit("shoot",{
x:me.x,
y:me.y
});

});

// 🏙️ MAPA (ulice + domy)
function drawMap(){

// droga
ctx.fillStyle = "#555";
ctx.fillRect(0,200,canvas.width,100);
ctx.fillRect(300,0,100,canvas.height);

// budynki
ctx.fillStyle = "#2b2b2b";

ctx.fillRect(100,100,80,80);
ctx.fillRect(600,120,120,120);
ctx.fillRect(500,400,100,100);

}

// 🎨 rysowanie
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// mapa
drawMap();

// gracze
for(let id in players){

let p = players[id];

ctx.fillStyle = p.team==="red"?"#ff4b4b":"#4b8bff";

ctx.fillRect(p.x-10,p.y-10,20,20);

// HP
ctx.fillStyle="red";
ctx.fillRect(p.x-10,p.y-18,20,3);

ctx.fillStyle="lime";
ctx.fillRect(p.x-10,p.y-18,(p.hp/100)*20,3);

}

// ty
ctx.fillStyle="yellow";
ctx.fillRect(me.x-10,me.y-10,20,20);

requestAnimationFrame(draw);
}

// loop
function loop(){
update();
requestAnimationFrame(loop);
}

loop();
draw();

</script>

</body>
</html>
