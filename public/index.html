<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>FPS 3D SIMPLE</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
cursor:none;
}

canvas{display:block;}

#menu{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(#111,#000);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
color:white;
}

button{
padding:15px 30px;
font-size:20px;
cursor:pointer;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:8px;
display:none;
}

#cross{
position:fixed;
left:50%;
top:50%;
width:10px;
height:10px;
border:2px solid white;
border-radius:50%;
transform:translate(-50%,-50%);
display:none;
}
</style>
</head>

<body>

<div id="menu">
<h1>FPS 3D SIMPLE</h1>
<button onclick="start()">START</button>
</div>

<div id="hud">
HP: <span id="hp">100</span> |
Kills: <span id="kills">0</span>
</div>

<div id="cross"></div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let players = {};
let myId = null;
let started = false;

let me = {
x:200,
y:200,
speed:3,
angle:0
};

// MAPA (ściany + granice świata)
const walls = [
{x:0,y:0,w:800,h:20},
{x:0,y:0,w:20,h:800},
{x:780,y:0,w:20,h:800},
{x:0,y:780,w:800,h:20},

{x:200,y:200,w:200,h:20},
{x:400,y:300,w:20,h:200}
];

// START
function start(){
document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";
document.getElementById("cross").style.display="block";
started = true;
}

// SOCKET
socket.on("init",(id)=>{myId=id;});

socket.on("players",(data)=>{
players=data;

document.getElementById("hp").innerText =
players[myId]?.hp || 100;

document.getElementById("kills").innerText =
players[myId]?.kills || 0;
});

// KONTROLA
let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// KOLIZJE
function collide(x,y){

for(let w of walls){
if(x>w.x && x<w.x+w.w && y>w.y && y<w.y+w.h){
return true;
}
}
return false;
}

// MOVE
function update(){

if(!started) return;

let nx = me.x;
let ny = me.y;

if(keys["w"]) ny -= me.speed;
if(keys["s"]) ny += me.speed;
if(keys["a"]) nx -= me.speed;
if(keys["d"]) nx += me.speed;

if(!collide(nx,ny)){
me.x = nx;
me.y = ny;
}

socket.emit("move",me);
}

// MYSZ
document.addEventListener("mousemove",(e)=>{
me.angle = Math.atan2(
e.clientY - canvas.height/2,
e.clientX - canvas.width/2
);
});

// STRZELANIE (NAPRAWIONE)
document.addEventListener("click",()=>{

if(!started) return;

socket.emit("shoot",{
x:me.x,
y:me.y
});
});

// RYSOWANIE
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// TŁO
ctx.fillStyle="#1a1a1a";
ctx.fillRect(0,0,canvas.width,canvas.height);

// ŚCIANY
ctx.fillStyle="#444";
for(let w of walls){
ctx.fillRect(w.x,w.y,w.w,w.h);
}

// GRACZE (FASOLKI)
for(let id in players){

let p = players[id];

ctx.fillStyle = p.team=="red"?"red":"blue";

ctx.beginPath();
ctx.arc(p.x,p.y,12,0,Math.PI*2);
ctx.fill();
}

// TY
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(me.x,me.y,12,0,Math.PI*2);
ctx.fill();
}

// LOOP
function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
