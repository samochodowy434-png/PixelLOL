<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Minecraft 3D Multiplayer</title>

<style>
body{margin:0;overflow:hidden;}
canvas{display:block;}
#hud{
position:fixed;
top:10px;
left:10px;
color:white;
font-family:Arial;
background:rgba(0,0,0,0.5);
padding:10px;
}
</style>
</head>

<body>

<div id="hud">
Minecraft 3D MP<br>
WASD + MYSZ<br>
LPM = blok | PPM = usuwanie
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

// 🌍 SCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 🌱 LIGHT
const light = new THREE.AmbientLight(0xffffff,1);
scene.add(light);

// 🧱 BLOCKS
let blocks = [];
let worldBlocks = [];

// 👤 PLAYERS
let players = {};

let me = {
x:0,
y:2,
z:0,
rotY:0
};

// TYPES
const colors = [0x8B4513,0x888888,0x00ff00];
let currentBlock = 0;

// INIT
socket.on("init",(data)=>{
players = data.players;
worldBlocks = data.blocks;

worldBlocks.forEach(addBlockMesh);
});

// UPDATE WORLD
socket.on("worldUpdate",(data)=>{
worldBlocks = data;
refreshBlocks();
});

socket.on("playersUpdate",(data)=>{
players = data;
});

// 🧱 CREATE BLOCK
function addBlockMesh(b){
const geo = new THREE.BoxGeometry(1,1,1);
const mat = new THREE.MeshBasicMaterial({color:colors[b.type]});
const mesh = new THREE.Mesh(geo,mat);

mesh.position.set(b.x,b.y,b.z);
scene.add(mesh);
blocks.push(mesh);
}

// RESET BLOCKS
function refreshBlocks(){
blocks.forEach(b=>scene.remove(b));
blocks=[];
worldBlocks.forEach(addBlockMesh);
}

// 🎮 INPUT
let keys={};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true;

if(e.key==="1") currentBlock=0;
if(e.key==="2") currentBlock=1;
if(e.key==="3") currentBlock=2;
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false;
});

// 🖱️ MOUSE
document.addEventListener("mousemove",(e)=>{
me.rotY -= e.movementX * 0.002;
camera.rotation.y = me.rotY;
});

// 🧱 COLLISION
function collide(x,z){

for(let b of worldBlocks){
if(
Math.abs(x-b.x)<0.6 &&
Math.abs(z-b.z)<0.6
){
return true;
}
}
return false;
}

// 🚶 MOVE
function update(){

let speed = 0.08;

let nx = me.x;
let nz = me.z;

if(keys["w"]){
nx += Math.sin(me.rotY)*speed;
nz += Math.cos(me.rotY)*speed;
}
if(keys["s"]){
nx -= Math.sin(me.rotY)*speed;
nz -= Math.cos(me.rotY)*speed;
}
if(keys["a"]){
nx += Math.sin(me.rotY-Math.PI/2)*speed;
nz += Math.cos(me.rotY-Math.PI/2)*speed;
}
if(keys["d"]){
nx += Math.sin(me.rotY+Math.PI/2)*speed;
nz += Math.cos(me.rotY+Math.PI/2)*speed;
}

// ✔ KOLIZJE
if(!collide(nx,nz)){
me.x = nx;
me.z = nz;
}

camera.position.set(me.x,me.y,me.z);

socket.emit("move",me);
}

// 🧱 PLACE BLOCK
document.addEventListener("click",()=>{
let b = {
x:Math.round(me.x + Math.sin(me.rotY)*2),
y:0,
z:Math.round(me.z + Math.cos(me.rotY)*2),
type:currentBlock
};

socket.emit("addBlock",b);
});

// ❌ REMOVE BLOCK
document.addEventListener("contextmenu",(e)=>{
e.preventDefault();

socket.emit("removeBlock",worldBlocks.length-1);
});

// 👤 DRAW PLAYERS
function drawPlayers(){

for(let id in players){

let p = players[id];

const geo = new THREE.SphereGeometry(0.3,8,8);
const mat = new THREE.MeshBasicMaterial({color:0xff0000});
const mesh = new THREE.Mesh(geo,mat);

mesh.position.set(p.x,p.y,p.z);
scene.add(mesh);

}

}

// LOOP
function loop(){
requestAnimationFrame(loop);

update();
drawPlayers();

renderer.render(scene,camera);
}

loop();

</script>

</body>
</html>
