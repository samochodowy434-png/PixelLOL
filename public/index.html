<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Flat Minecraft 3D</title>

<style>
body{margin:0;overflow:hidden;}
canvas{display:block;}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
font-family:Arial;
}
</style>
</head>

<body>

<div id="hud">
FLAT MINECRAFT 3D<br>
WASD + MYSZ<br>
LPM = blok | PPM = niszcz
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

// 🌍 SCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1));

// WORLD
let world = [];
let meshes = [];

// PLAYERS
let players = {};

// PLAYER
let me = {
x:0,
y:2,
z:0,
rotY:0,
speed:0.08
};

// COLORS
const colors = [0x8B4513,0x777777,0x00ff00];
let currentBlock = 0;

// INIT
socket.on("init",(data)=>{
world = data.world;
drawWorld();
});

// PLAYERS
socket.on("players",(p)=>{
players = p;
});

// WORLD UPDATE
socket.on("world",(w)=>{
world = w;
drawWorld();
});

// CREATE BLOCK
function addBlock(b){
const geo = new THREE.BoxGeometry(1,1,1);
const mat = new THREE.MeshBasicMaterial({color:colors[b.type]});
const mesh = new THREE.Mesh(geo,mat);

mesh.position.set(b.x,b.y,b.z);
scene.add(mesh);
meshes.push(mesh);
}

// REDRAW WORLD
function drawWorld(){
meshes.forEach(m=>scene.remove(m));
meshes=[];

world.forEach(addBlock);
}

// INPUT
let keys={};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true;

if(e.key==="1") currentBlock=0;
if(e.key==="2") currentBlock=1;
if(e.key==="3") currentBlock=2;
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false;
});

// MOUSE LOOK
document.addEventListener("mousemove",(e)=>{
me.rotY -= e.movementX * 0.002;
camera.rotation.y = me.rotY;
});

// KOLIZJE (FLAT WORLD)
function collide(x,z){

for(let b of world){
if(b.type !== 2){ // ziemia nie blokuje
if(Math.abs(x-b.x)<0.5 && Math.abs(z-b.z)<0.5){
return true;
}
}
}

return false;
}

// MOVE
function update(){

let nx = me.x;
let nz = me.z;

if(keys["w"]){
nx += Math.sin(me.rotY)*me.speed;
nz += Math.cos(me.rotY)*me.speed;
}
if(keys["s"]){
nx -= Math.sin(me.rotY)*me.speed;
nz -= Math.cos(me.rotY)*me.speed;
}
if(keys["a"]){
nx += Math.sin(me.rotY-Math.PI/2)*me.speed;
nz += Math.cos(me.rotY-Math.PI/2)*me.speed;
}
if(keys["d"]){
nx += Math.sin(me.rotY+Math.PI/2)*me.speed;
nz += Math.cos(me.rotY+Math.PI/2)*me.speed;
}

if(!collide(nx,nz)){
me.x = nx;
me.z = nz;
}

camera.position.set(me.x,me.y,me.z);

socket.emit("move",me);
}

// 🧱 STAWIANIE
document.addEventListener("click",()=>{
world.push({
x:Math.round(me.x + Math.sin(me.rotY)),
y:1,
z:Math.round(me.z + Math.cos(me.rotY)),
type:currentBlock
});

socket.emit("addBlock",world[world.length-1]);
});

// ❌ NISZCZENIE
document.addEventListener("contextmenu",(e)=>{
e.preventDefault();

let best = -1;
let dist = 999;

world.forEach((b,i)=>{
let d = Math.hypot(b.x-me.x, b.z-me.z);
if(d < 3 && d < dist){
dist = d;
best = i;
}
});

if(best !== -1){
socket.emit("removeBlock",best);
}
});

// LOOP
function loop(){
requestAnimationFrame(loop);
update();
renderer.render(scene,camera);
}

loop();

</script>

</body>
</html>
