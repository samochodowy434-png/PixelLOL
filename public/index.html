<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Minecraft MULTI</title>

<style>
body { margin:0; overflow:hidden; cursor:none; }
canvas { display:block; }

#crosshair{
position:fixed;
left:50%;
top:50%;
width:10px;
height:10px;
border:2px solid white;
transform:translate(-50%,-50%);
border-radius:50%;
}
</style>
</head>

<body>

<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

// SCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

// PLAYER
let me = {
x:0,y:2,z:0,rotY:0,speed:0.08
};

// INNI GRACZE
let players = {};
let meshes = {};

// LOCK MYSZY
document.body.addEventListener("click",()=>{
document.body.requestPointerLock();
});

// MYSZ
document.addEventListener("mousemove",(e)=>{
if(document.pointerLockElement === document.body){
me.rotY -= e.movementX * 0.002;
}
camera.rotation.y = me.rotY;
});

// KLAWIATURA
let keys={};

document.addEventListener("keydown",(e)=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",(e)=>keys[e.key.toLowerCase()]=false);

// RUCH
function move(){

let nx = me.x;
let nz = me.z;

if(keys["w"]){
nx += Math.sin(me.rotY)*me.speed;
nz += Math.cos(me.rotY)*me.speed;
}
if(keys["s"]){
nx -= Math.sin(me.rotY)*me.speed;
nz -= Math.cos(me.rotY)*me.speed;
}
if(keys["a"]){
nx += Math.sin(me.rotY-Math.PI/2)*me.speed;
nz += Math.cos(me.rotY-Math.PI/2)*me.speed;
}
if(keys["d"]){
nx += Math.sin(me.rotY+Math.PI/2)*me.speed;
nz += Math.cos(me.rotY+Math.PI/2)*me.speed;
}

me.x = nx;
me.z = nz;

camera.position.set(me.x,me.y,me.z);

socket.emit("move",me);
}

// RYSUJ GRACZY
function renderPlayers(){

for(let id in players){

if(!meshes[id]){
const mesh = new THREE.Mesh(
new THREE.BoxGeometry(0.8,1.6,0.8),
new THREE.MeshBasicMaterial({color:0xff0000})
);
scene.add(mesh);
meshes[id]=mesh;
}

meshes[id].position.set(
players[id].x,
players[id].y,
players[id].z
);

}
}

// SOCKET
socket.on("players",(data)=>{
players = data;
});

// LOOP
function loop(){
requestAnimationFrame(loop);

move();
renderPlayers();

renderer.render(scene,camera);
}

loop();

</script>

</body>
</html>
