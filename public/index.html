<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>2D FPS PRO</title>

<style>
body{
margin:0;
overflow:hidden;
background:#0f1720;
font-family:Arial;
cursor:none;
}

canvas{display:block;}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:8px;
}

#cross{
position:fixed;
left:50%;
top:50%;
width:10px;
height:10px;
border:2px solid white;
border-radius:50%;
transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div id="hud">
HP: <span id="hp">100</span><br>
Kills: <span id="kills">0</span>
</div>

<div id="cross"></div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let players = {};
let myId = null;

let me = {
x:300,
y:300,
speed:4,
angle:0
};

// SOCKET
socket.on("init",(id)=>{
myId = id;
});

socket.on("players",(data)=>{
players = data;
document.getElementById("kills").innerText =
players[myId]?.kills || 0;

document.getElementById("hp").innerText =
players[myId]?.hp || 100;
});

// MOVE
let keys = {};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false;
});

function update(){

if(keys["w"]) me.y -= me.speed;
if(keys["s"]) me.y += me.speed;
if(keys["a"]) me.x -= me.speed;
if(keys["d"]) me.x += me.speed;

socket.emit("move", me);
}

// 🖱️ MYSZ = OBROT KAMERY
document.addEventListener("mousemove",(e)=>{

me.angle = Math.atan2(
e.clientY - canvas.height/2,
e.clientX - canvas.width/2
);

});

// 🔫 STRZELANIE
document.addEventListener("click",()=>{

socket.emit("shoot",{
x:me.x,
y:me.y
});

});

// DRAW
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

// players
for(let id in players){

let p = players[id];

ctx.fillStyle = p.team === "red" ? "#ff4444" : "#4488ff";

ctx.beginPath();
ctx.arc(p.x,p.y,12,0,Math.PI*2);
ctx.fill();

// HP BAR
ctx.fillStyle="red";
ctx.fillRect(p.x-12,p.y-18,24,4);

ctx.fillStyle="lime";
ctx.fillRect(p.x-12,p.y-18,(p.hp/100)*24,4);
}

// TY
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(me.x,me.y,12,0,Math.PI*2);
ctx.fill();

requestAnimationFrame(draw);
}

// LOOP
function loop(){
update();
requestAnimationFrame(loop);
}

loop();
draw();

</script>

</body>
</html>
