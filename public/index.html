<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Minecraft 3D PRO</title>

<style>
body{margin:0;overflow:hidden;}
canvas{display:block;}

#hud{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
font-family:Arial;
}
</style>
</head>

<body>

<div id="hud">
Minecraft 3D PRO<br>
WASD + MYSZ<br>
LPM = blok | PPM = niszcz
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

// 🌍 SCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1));

// WORLD
let blocks = [];
let world = [];

// PLAYERS
let players = {};

// PLAYER
let me = {
x:0,
y:2,
z:0,
rotY:0,
speed:0.08
};

// BLOCK COLORS
const colors = [0x8B4513,0x777777,0x00ff00];
let currentBlock = 0;

// INIT
socket.on("init",(data)=>{
players = data.players;
world = data.blocks;
drawWorld();
});

// PLAYERS UPDATE
socket.on("players",(p)=>{
players = p;
});

// WORLD UPDATE
socket.on("world",(w)=>{
world = w;
drawWorld();
});

// CREATE BLOCK
function createBlock(b){
const geo = new THREE.BoxGeometry(1,1,1);
const mat = new THREE.MeshBasicMaterial({color:colors[b.type]});
const mesh = new THREE.Mesh(geo,mat);

mesh.position.set(b.x,b.y,b.z);
scene.add(mesh);
blocks.push(mesh);
}

// REDRAW WORLD
function drawWorld(){
blocks.forEach(b=>scene.remove(b));
blocks=[];

world.forEach(createBlock);
}

// INPUT
let keys={};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true;

if(e.key==="1") currentBlock=0;
if(e.key==="2") currentBlock=1;
if(e.key==="3") currentBlock=2;
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false;
});

// MOUSE LOOK
document.addEventListener("mousemove",(e)=>{
me.rotY -= e.movementX * 0.002;
camera.rotation.y = me.rotY;
});

// COLLISION
function collides(x,z){
for(let b of world){
if(
Math.abs(x-b.x)<0.6 &&
Math.abs(z-b.z)<0.6
){
return true;
}
}
return false;
}

// MOVE (MC STYLE)
function update(){

let nx = me.x;
let nz = me.z;

if(keys["w"]){
nx += Math.sin(me.rotY)*me.speed;
nz += Math.cos(me.rotY)*me.speed;
}
if(keys["s"]){
nx -= Math.sin(me.rotY)*me.speed;
nz -= Math.cos(me.rotY)*me.speed;
}
if(keys["a"]){
nx += Math.sin(me.rotY-Math.PI/2)*me.speed;
nz += Math.cos(me.rotY-Math.PI/2)*me.speed;
}
if(keys["d"]){
nx += Math.sin(me.rotY+Math.PI/2)*me.speed;
nz += Math.cos(me.rotY+Math.PI/2)*me.speed;
}

// ✔ KOLIZJE JAK MC
if(!collides(nx,nz)){
me.x = nx;
me.z = nz;
}

camera.position.set(me.x,me.y,me.z);

socket.emit("move",me);
}

// 🧱 STAWIANIE BLOKÓW (MC STYLE)
document.addEventListener("click",()=>{
let b = {
x:Math.round(me.x + Math.sin(me.rotY)),
y:0,
z:Math.round(me.z + Math.cos(me.rotY)),
type:currentBlock
};

socket.emit("addBlock",b);
});

// ❌ NISZCZENIE BLOKÓW (NAJBLIŻSZY)
document.addEventListener("contextmenu",(e)=>{
e.preventDefault();

let bestIndex = -1;
let bestDist = 999;

world.forEach((b,i)=>{
let dx = b.x - me.x;
let dz = b.z - me.z;

let d = Math.sqrt(dx*dx+dz*dz);

if(d < bestDist && d < 3){
bestDist = d;
bestIndex = i;
}
});

if(bestIndex !== -1){
socket.emit("removeBlock",bestIndex);
}
});

// LOOP
function loop(){
requestAnimationFrame(loop);

update();

renderer.render(scene,camera);
}

loop();

</script>

</body>
</html>
