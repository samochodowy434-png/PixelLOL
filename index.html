<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PixelLOL</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial;
    background:black;
}

#menu{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(#111,#000);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:10;
}

#menu h1{
    color:white;
    font-size:70px;
    margin-bottom:40px;
}

.teamBtn{
    width:300px;
    height:70px;
    margin:10px;
    border:none;
    font-size:24px;
    cursor:pointer;
    color:white;
}

.red{
    background:#d40000;
}

.blue{
    background:#0066ff;
}

#hud{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:24px;
    display:none;
    z-index:5;
}

#crosshair{
    position:absolute;
    width:20px;
    height:20px;
    border:3px solid white;
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
}

canvas{
    display:block;
}

</style>
</head>
<body>

<div id="menu">
    <h1>PIXEL LOL</h1>

    <button class="teamBtn red"
    onclick="startGame('red')">
    CZERWONI
    </button>

    <button class="teamBtn blue"
    onclick="startGame('blue')">
    NIEBIESCY
    </button>
</div>

<div id="hud">
    ❤️ HP: <span id="hp">100</span><br>
    🏆 Punkty: <span id="score">0</span><br>
    🔴 Drużyna:
    <span id="team"></span>
</div>

<div id="crosshair"></div>

<canvas id="game"></canvas>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let gameStarted=false;

let keys={};

let camera={
    x:0,
    y:0
};

let player={
    x:2500,
    y:2500,
    size:40,
    speed:6,
    hp:100,
    score:0,
    team:"red"
};

const MAP_SIZE=5000;

document.addEventListener("keydown",(e)=>{
    keys[e.key.toLowerCase()]=true;
});

document.addEventListener("keyup",(e)=>{
    keys[e.key.toLowerCase()]=false;
});

document.addEventListener("mousemove",(e)=>{

    const c=
    document.getElementById("crosshair");

    c.style.left=e.clientX+"px";
    c.style.top=e.clientY+"px";

});

function startGame(team){

    player.team=team;

    document.getElementById("menu")
    .style.display="none";

    document.getElementById("hud")
    .style.display="block";

    document.getElementById("team")
    .innerText=
    team==="red"
    ?"CZERWONI"
    :"NIEBIESCY";

    gameStarted=true;
}

function movePlayer(){

    if(keys["w"])
    player.y-=player.speed;

    if(keys["s"])
    player.y+=player.speed;

    if(keys["a"])
    player.x-=player.speed;

    if(keys["d"])
    player.x+=player.speed;

    player.x=Math.max(
        0,
        Math.min(MAP_SIZE,
        player.x)
    );

    player.y=Math.max(
        0,
        Math.min(MAP_SIZE,
        player.y)
    );
}

function drawMap(){

    ctx.fillStyle="#222";

    ctx.fillRect(
        0,
        0,
        MAP_SIZE,
        MAP_SIZE
    );

    ctx.strokeStyle="#333";

    for(let x=0;x<MAP_SIZE;x+=100){

        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,MAP_SIZE);
        ctx.stroke();
    }

    for(let y=0;y<MAP_SIZE;y+=100){

        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(MAP_SIZE,y);
        ctx.stroke();
    }
}

function drawPlayer(){

    ctx.fillStyle=
    player.team==="red"
    ?"#ff2222"
    :"#2288ff";

    ctx.fillRect(
        player.x-player.size/2,
        player.y-player.size/2,
        player.size,
        player.size
    );
}

function updateCamera(){

    camera.x=
    player.x-canvas.width/2;

    camera.y=
    player.y-canvas.height/2;
}

function updateHUD(){

    document.getElementById("hp")
    .innerText=player.hp;

    document.getElementById("score")
    .innerText=player.score;
}

function gameLoop(){

    requestAnimationFrame(gameLoop);

    if(!gameStarted)
    return;

    movePlayer();

    updateCamera();

    updateHUD();

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.save();

    ctx.translate(
        -camera.x,
        -camera.y
    );

    drawMap();

    drawPlayer();

    ctx.restore();
}

gameLoop();

</script>

</body>
</html>
