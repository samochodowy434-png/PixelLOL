<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelLOL</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:Arial,sans-serif;
}

/* MENU */

#menu{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:linear-gradient(
        -45deg,
        #ff0080,
        #7928ca,
        #00c6ff,
        #00ff88
    );

    background-size:400% 400%;
    animation:bg 12s infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

h1{
    color:white;
    font-size:100px;
    text-shadow:0 0 30px white;
}

button{
    margin-top:30px;
    width:300px;
    height:80px;
    border:none;
    border-radius:20px;
    font-size:35px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.1);
}

#gameCanvas{
    display:none;
}
</style>
</head>
<body>

<div id="menu">
    <h1>PIXELLOL</h1>
    <button id="startBtn">START</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>

const startBtn = document.getElementById("startBtn");
const menu = document.getElementById("menu");
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

startBtn.onclick = () => {

    menu.style.display = "none";
    canvas.style.display = "block";

    startGame();
};

function startGame(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let player = {
        x:500,
        y:500,
        size:30,
        speed:5
    };

    const keys = {};

    document.addEventListener("keydown",e=>{
        keys[e.key.toLowerCase()] = true;
    });

    document.addEventListener("keyup",e=>{
        keys[e.key.toLowerCase()] = false;
    });

    const trees = [];
    const houses = [];

    for(let i=0;i<50;i++){
        trees.push({
            x:Math.random()*3000,
            y:Math.random()*3000
        });
    }

    for(let i=0;i<15;i++){
        houses.push({
            x:Math.random()*3000,
            y:Math.random()*3000,
            w:120,
            h:120
        });
    }

    function update(){

        if(keys["w"]) player.y -= player.speed;
        if(keys["s"]) player.y += player.speed;
        if(keys["a"]) player.x -= player.speed;
        if(keys["d"]) player.x += player.speed;
    }

    function draw(){

        ctx.clearRect(0,0,canvas.width,canvas.height);

        const camX = player.x - canvas.width/2;
        const camY = player.y - canvas.height/2;

        ctx.fillStyle="#6ac259";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        for(const tree of trees){

            const x = tree.x - camX;
            const y = tree.y - camY;

            ctx.fillStyle="brown";
            ctx.fillRect(x+10,y+20,20,30);

            ctx.fillStyle="green";
            ctx.beginPath();
            ctx.arc(x+20,y+15,25,0,Math.PI*2);
            ctx.fill();
        }

        for(const h of houses){

            ctx.fillStyle="gray";

            ctx.fillRect(
                h.x-camX,
                h.y-camY,
                h.w,
                h.h
            );
        }

        ctx.fillStyle="red";

        ctx.fillRect(
            1500-camX,
            1500-camY,
            80,
            40
        );

        ctx.fillStyle="blue";

        ctx.fillRect(
            player.x-camX,
            player.y-camY,
            player.size,
            player.size
        );

        ctx.fillStyle="white";
        ctx.font="24px Arial";
        ctx.fillText(
            "WASD - ruch",
            20,
            40
        );
    }

    function loop(){

        update();
        draw();

        requestAnimationFrame(loop);
    }

    loop();
}
</script>

</body>
</html>
