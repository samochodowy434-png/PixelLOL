<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PixelLOL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:Arial;
background:#000;
cursor:none;
}

canvas{
display:block;
}

#menu{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(#111,#000);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}

#menu h1{
color:white;
font-size:80px;
margin-bottom:40px;
}

.teamBtn{
width:300px;
height:70px;
font-size:25px;
margin:10px;
border:none;
cursor:pointer;
color:white;
}

.red{
background:#d40000;
}

.blue{
background:#0066ff;
}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:22px;
display:none;
z-index:5;
}

#crosshair{
position:absolute;
width:20px;
height:20px;
border:3px solid white;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:20;
}

</style>
</head>

<body>

<div id="menu">

<h1>PIXEL LOL</h1>

<button
class="teamBtn red"
onclick="startGame('red')">
CZERWONI
</button>

<button
class="teamBtn blue"
onclick="startGame('blue')">
NIEBIESCY
</button>

</div>

<div id="hud">

❤️ HP:
<span id="hp">100</span>

<br>

🏆 Punkty:
<span id="score">0</span>

<br>

💀 Kille:
<span id="kills">0</span>

<br>

🔫 Broń:
<span id="weapon">Pistolet</span>

</div>

<div id="crosshair"></div>

<canvas id="game"></canvas>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

const MAP_SIZE = 5000;

let gameStarted = false;

let keys = {};

let bullets = [];

let enemies = [];

let camera = {
x:0,
y:0
};

let player = {
x:2500,
y:2500,
size:40,
speed:6,
hp:100,
maxHp:100,
score:0,
kills:0,
team:"red"
};

for(let i=0;i<20;i++){

enemies.push({

x:Math.random()*MAP_SIZE,
y:Math.random()*MAP_SIZE,
size:40,
hp:100

});

}

document.addEventListener(
"keydown",
e=>{

keys[
e.key.toLowerCase()
]=true;

});

document.addEventListener(
"keyup",
e=>{

keys[
e.key.toLowerCase()
]=false;

});

document.addEventListener(
"mousemove",
e=>{

const c =
document.getElementById(
"crosshair"
);

c.style.left =
e.clientX+"px";

c.style.top =
e.clientY+"px";

});

document.addEventListener(
"click",
e=>{

if(!gameStarted)
return;

const angle =
Math.atan2(

e.clientY -
canvas.height/2,

e.clientX -
canvas.width/2

);

bullets.push({

x:player.x,
y:player.y,

dx:
Math.cos(angle)*15,

dy:
Math.sin(angle)*15

});

});

function startGame(team){

player.team = team;

document.getElementById(
"menu"
).style.display="none";

document.getElementById(
"hud"
).style.display="block";

gameStarted = true;

}

function movePlayer(){

if(keys["w"])
player.y-=player.speed;

if(keys["s"])
player.y+=player.speed;

if(keys["a"])
player.x-=player.speed;

if(keys["d"])
player.x+=player.speed;

player.x =
Math.max(
0,
Math.min(
MAP_SIZE,
player.x
)
);

player.y =
Math.max(
0,
Math.min(
MAP_SIZE,
player.y
)
);

}

function updateCamera(){

camera.x =
player.x -
canvas.width/2;

camera.y =
player.y -
canvas.height/2;

}
    function updateBullets(){

for(let i=bullets.length-1;i>=0;i--){

let b=bullets[i];

b.x+=b.dx;
b.y+=b.dy;

if(
b.x<0||
b.y<0||
b.x>MAP_SIZE||
b.y>MAP_SIZE
){

bullets.splice(i,1);

}

}

}

function bulletHits(){

for(let i=bullets.length-1;i>=0;i--){

let b=bullets[i];

for(let j=enemies.length-1;j>=0;j--){

let e=enemies[j];

let dx=b.x-e.x;
let dy=b.y-e.y;

let dist=
Math.sqrt(
dx*dx+
dy*dy
);

if(dist<30){

e.hp-=50;

bullets.splice(i,1);

if(e.hp<=0){

enemies.splice(j,1);

player.score+=100;
player.kills++;

enemies.push({

x:Math.random()*MAP_SIZE,
y:Math.random()*MAP_SIZE,
size:40,
hp:100

});

}

break;

}

}

}

}

function drawMap(){

ctx.fillStyle="#1f1f1f";

ctx.fillRect(
0,
0,
MAP_SIZE,
MAP_SIZE
);

ctx.strokeStyle="#333";

for(
let x=0;
x<MAP_SIZE;
x+=100
){

ctx.beginPath();

ctx.moveTo(x,0);

ctx.lineTo(
x,
MAP_SIZE
);

ctx.stroke();

}

for(
let y=0;
y<MAP_SIZE;
y+=100
){

ctx.beginPath();

ctx.moveTo(0,y);

ctx.lineTo(
MAP_SIZE,
y
);

ctx.stroke();

}

}

function drawPlayer(){

ctx.fillStyle=

player.team==="red"
?
"#ff2222"
:
"#2288ff";

ctx.fillRect(

player.x-player.size/2,

player.y-player.size/2,

player.size,

player.size

);

}

function drawEnemies(){

enemies.forEach(enemy=>{

ctx.fillStyle="lime";

ctx.fillRect(

enemy.x-20,

enemy.y-20,

40,

40

);

ctx.fillStyle="red";

ctx.fillRect(

enemy.x-20,

enemy.y-35,

40,

5

);

ctx.fillStyle="lime";

ctx.fillRect(

enemy.x-20,

enemy.y-35,

(enemy.hp/100)*40,

5

);

});

}

function drawBullets(){

ctx.fillStyle="yellow";

bullets.forEach(b=>{

ctx.beginPath();

ctx.arc(
b.x,
b.y,
5,
0,
Math.PI*2
);

ctx.fill();

});

}

function updateHUD(){

document.getElementById(
"hp"
).innerText=
player.hp;

document.getElementById(
"score"
).innerText=
player.score;

document.getElementById(
"kills"
).innerText=
player.kills;

}

function gameLoop(){

requestAnimationFrame(
gameLoop
);

if(!gameStarted)
return;

movePlayer();

updateCamera();

updateBullets();

bulletHits();

updateHUD();

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.save();

ctx.translate(
-camera.x,
-camera.y
);

drawMap();
    drawWalls();
enemyDamage();

drawEnemies();

drawBullets();

drawPlayer();
    drawDeathText();

ctx.restore();

}

gameLoop();
// ===== CZĘŚĆ 3 =====

player.deaths = 0;

let currentWeapon = 1;

let weaponData = {

1:{
name:"Pistolet",
damage:50,
speed:15
},

2:{
name:"Karabin",
damage:30,
speed:20
},

3:{
name:"Shotgun",
damage:25,
speed:13
},

4:{
name:"Snajperka",
damage:100,
speed:25
}

};

let walls=[];

for(let i=0;i<60;i++){

walls.push({

x:Math.random()*MAP_SIZE,
y:Math.random()*MAP_SIZE,
w:100,
h:100

});

}

document.addEventListener(
"keydown",
e=>{

if(e.key==="1")
currentWeapon=1;

if(e.key==="2")
currentWeapon=2;

if(e.key==="3")
currentWeapon=3;

if(e.key==="4")
currentWeapon=4;

});

function drawWalls(){

ctx.fillStyle="#666";

walls.forEach(w=>{

ctx.fillRect(
w.x,
w.y,
w.w,
w.h
);

});

}

function respawn(){

player.hp=100;

player.x=
Math.random()*MAP_SIZE;

player.y=
Math.random()*MAP_SIZE;

}

function killPlayer(){

player.deaths++;

player.score-=50;

setTimeout(
respawn,
5000
);

}

function enemyDamage(){

enemies.forEach(enemy=>{

let dx=
player.x-enemy.x;

let dy=
player.y-enemy.y;

let dist=
Math.sqrt(
dx*dx+
dy*dy
);

if(dist<60){

player.hp-=0.15;

}

});

if(player.hp<=0){

player.hp=0;

killPlayer();

}

}

const oldClick=
document.onclick;

document.addEventListener(
"click",
e=>{

if(!gameStarted)
return;

let weapon=
weaponData[
currentWeapon
];

document.getElementById(
"weapon"
).innerText=
weapon.name;

const angle=
Math.atan2(

e.clientY-
canvas.height/2,

e.clientX-
canvas.width/2

);

if(currentWeapon===3){

for(let s=-2;s<=2;s++){

bullets.push({

x:player.x,
y:player.y,

dx:
Math.cos(
angle+s*0.15
)*weapon.speed,

dy:
Math.sin(
angle+s*0.15
)*weapon.speed,

damage:
weapon.damage

});

}

}
else{

bullets.push({

x:player.x,
y:player.y,

dx:
Math.cos(angle)
*weapon.speed,

dy:
Math.sin(angle)
*weapon.speed,

damage:
weapon.damage

});

}

});

function drawDeathText(){

if(player.hp>0)
return;

ctx.fillStyle="red";

ctx.font="80px Arial";

ctx.fillText(

"ZGINĄŁEŚ",

canvas.width/2-200,

canvas.height/2

);

}
    </script>

</body>
</html>
